schema_version: 1

module:
  name: nsx-harness
  type: backend_specific
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_harness
    targets:
      - nsx::harness

depends:
  required:
    - nsx-core
    - nsx-soc-hal
  optional:
    - nsx-perf
    - nsx-pmu-armv8m

compatibility:
  boards:
    - "*"
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
